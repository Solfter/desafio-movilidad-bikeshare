# Levanta la API (8000) y el dashboard (8050) desde la misma imagen.
# Uso: docker compose up --build
services:
  api:
    build: .
    image: bikeshare:latest
    command: uvicorn bikeshare.api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5

  dashboard:
    build: .
    image: bikeshare:latest
    command: python -m bikeshare.dashboard.app
    environment:
      # El dashboard consume la API por el nombre de servicio de la red de compose.
      API_URL: "http://api:8000"
    ports:
      - "8050:8050"
    depends_on:
      api:
        condition: service_healthy
